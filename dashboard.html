<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ponto Facial PRO — Painel Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topo">
    <div class="marca"><span class="bolinha">⏱</span> Ponto Facial PRO</div>
    <button class="botao-sair" id="botaoSair">Sair</button>
  </div>

  <div class="abas">
    <button class="aba ativa" data-aba="monitoramento">Monitoramento</button>
    <button class="aba" data-aba="funcionarios">Funcionários</button>
    <button class="aba" data-aba="relatorio">Relatório</button>
    <button class="aba" data-aba="logs">Log de Auditoria</button>
  </div>

  <div class="conteudo">
    <!-- MONITORAMENTO -->
    <section class="secao ativa" id="secao-monitoramento">
      <h2 class="titulo-secao">Monitoramento de hoje</h2>
      <div id="notificacoesHoje"></div>
      <div id="listaMonitoramento" class="carregando">Carregando...</div>
    </section>

    <!-- FUNCIONÁRIOS -->
    <section class="secao" id="secao-funcionarios">
      <h2 class="titulo-secao">Funcionários</h2>
      <div id="listaFuncionarios" class="carregando">Carregando...</div>
    </section>

    <!-- RELATÓRIO -->
    <section class="secao" id="secao-relatorio">
      <h2 class="titulo-secao">Relatório de pontos</h2>
      <div class="filtros">
        <div>
          <label for="filtroFuncionario">Funcionário</label>
          <select id="filtroFuncionario"><option value="">Todos</option></select>
        </div>
        <div>
          <label for="filtroInicio">Data início</label>
          <input type="date" id="filtroInicio" />
        </div>
        <div>
          <label for="filtroFim">Data fim</label>
          <input type="date" id="filtroFim" />
        </div>
        <div>
          <button class="botao-primario" id="botaoFiltrarRelatorio" style="width:auto;padding:11px 18px;">Filtrar</button>
        </div>
      </div>
      <div id="tabelaRelatorio" class="carregando">Escolha um período e clique em Filtrar.</div>
    </section>

    <!-- LOGS -->
    <section class="secao" id="secao-logs">
      <h2 class="titulo-secao">Log de auditoria</h2>
      <div class="filtros">
        <div>
          <label for="filtroDiaLog">Dia</label>
          <input type="date" id="filtroDiaLog" />
        </div>
        <div>
          <button class="botao-primario" id="botaoFiltrarLog" style="width:auto;padding:11px 18px;">Filtrar</button>
        </div>
      </div>
      <div id="tabelaLogs" class="carregando">Escolha um dia e clique em Filtrar.</div>
    </section>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
